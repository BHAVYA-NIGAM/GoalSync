<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports - GoalSync</title>
    <link rel="stylesheet" href="/public/css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=notifications"
    />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
</head>
  <body>
    <div class="app-shell">
      <div class="layout">
        <aside class="sidebar">
          <div class="brand-panel">
            <div class="brand-mark">GS</div>
            <div class="brand">GoalSync</div>
            <p>
              Export planned vs actual performance data for governance reviews
              and hackathon demos.
            </p>
          </div>
          <nav class="nav-links" data-sidebar></nav>
        </aside>
        <main class="main">
          <div class="topbar">
            <div class="page-title">
              <h1 id="page-title"></h1>
              <p id="page-text"></p>
            </div>
            <div class="topbar-right">
              <div class="profile-box" data-topbar-user></div>
            </div>
          </div>
          <section id="report-shell" class="card content-card">
            <h3>Achievement Report</h3>
            <form id="filter-form" class="filters">
              <input type="text" name="employeeId" placeholder="Employee ID" />
              <select id="report-department" name="department"></select>
              <select name="quarter">
                <option value="">All Quarters</option>
                <option value="Q1">Q1</option>
                <option value="Q2">Q2</option>
                <option value="Q3">Q3</option>
                <option value="Q4">Q4</option>
              </select>
              <button class="btn btn-primary" type="submit">
                Apply Filters
              </button>
            </form>
            <div class="toolbar">
              <button
                id="export-csv-btn"
                class="btn btn-secondary"
                type="button"
              >
                Export CSV
              </button>
              <button
                id="export-excel-btn"
                class="btn btn-secondary"
                type="button"
              >
                Export Excel
              </button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Employee</th>
                    <th>Department</th>
                    <th>Goal</th>
                    <th>Status</th>
                    <th>Target</th>
                    <th>Actuals</th>
                    <th>Score</th>
                  </tr>
                </thead>
                <tbody id="report-body"></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script src="/public/js/common.js"></script>
    <script src="/public/js/reports.js"></script>
  </body>
</html>
