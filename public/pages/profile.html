<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - GoalSync</title>
    <link rel="stylesheet" href="/public/css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=notifications"
    />
    <link rel="icon" type="image/x-icon" href="/public/favicon.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
</head>
  <body>
    <div class="app-shell">
    <div class="layout">
      <aside class="sidebar">
        <div class="brand-panel">
          <div class="brand-mark">GS</div>
          <div class="brand">GoalSync</div>
          <p>Manage your account and quickly understand what data your role can access in GoalSync.</p>
        </div>
        <nav class="nav-links" data-sidebar></nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div class="page-title">
            <h1 id="page-title"></h1>
            <p id="page-text"></p>
          </div>
          <div class="topbar-right">
            <div class="profile-box" data-topbar-user></div>
          </div>
        </div>
        <section class="split">
          <div class="card content-card">
            <h3>Profile Details</h3>
            <form id="profile-form" class="form-grid">
              <div class="field">
                <label>Full Name</label>
                <input type="text" id="profile-name" name="name" required />
              </div>
              <div class="field">
                <label>Email</label>
                <input type="email" id="profile-email" disabled />
              </div>
              <div class="field">
                <label>Role</label>
                <input type="text" id="profile-role" disabled />
              </div>
              <div class="field">
                <label>Department</label>
                <select id="profile-department" name="department" required></select>
              </div>
              <div class="field">
                <label>New Password</label>
                <input
                  type="password"
                  id="profile-password"
                  name="password"
                  minlength="6"
                  placeholder="Leave blank to keep current password"
                />
              </div>
              <button class="btn btn-primary" type="submit">Save Profile</button>
            </form>
          </div>
          <div class="card content-card">
            <h3>Role Access Summary</h3>
            <div id="profile-summary" class="notification-list"></div>
          </div>
        </section>
      </main>
    </div>
    </div>
    <script src="/public/js/common.js"></script>
    <script src="/public/js/profile.js"></script>
  </body>
</html>
