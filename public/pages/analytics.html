<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics - GoalSync</title>
    <link rel="stylesheet" href="/public/css/style.css" />
    <link rel="icon" type="image/x-icon" href="/public/favicon.png" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=notifications"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
</head>
  <body>
    <div class="app-shell">
    <div class="layout">
      <aside class="sidebar">
        <div class="brand-panel">
          <div class="brand-mark">GS</div>
          <div class="brand">GoalSync</div>
          <p>Analytics workspace for trend tracking, completion movement, and manager effectiveness.</p>
        </div>
        <nav class="nav-links" data-sidebar></nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div class="page-title">
            <h1 id="page-title"></h1>
            <p id="page-text"></p>
          </div>
          <div class="topbar-right">
            <div class="profile-box" data-topbar-user></div>
          </div>
        </div>
        <section class="chart-grid">
          <div class="card chart-box">
            <h3>QoQ Trends</h3>
            <canvas id="qoqChart"></canvas>
          </div>
          <div class="card chart-box">
            <h3>Goal Distribution</h3>
            <canvas id="distributionChart"></canvas>
          </div>
          <div class="card chart-box">
            <h3>Department Completion</h3>
            <canvas id="departmentChart"></canvas>
          </div>
          <div class="card chart-box">
            <h3>Manager Effectiveness</h3>
            <canvas id="managerChart"></canvas>
          </div>
          <div class="card chart-box">
            <h3>UoM Distribution</h3>
            <canvas id="uomChart"></canvas>
          </div>
          <div class="card chart-box">
            <h3>Thrust Area Mix</h3>
            <canvas id="thrustChart"></canvas>
          </div>
        </section>
      </main>
    </div>
    </div>
    <script src="/public/js/common.js"></script>
    <script src="/public/js/analytics.js"></script>
  </body>
</html>
