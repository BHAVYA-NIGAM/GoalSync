<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quarterly Check-In - GoalSync</title>
    <link rel="stylesheet" href="/public/css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=notifications"
    />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
</head>
  <body>
    <div class="app-shell">
    <div class="layout">
      <aside class="sidebar">
        <div class="brand-panel">
          <div class="brand-mark">GS</div>
          <div class="brand">GoalSync</div>
          <p>Quarterly update area for capturing actuals, progress status, and check-in notes for approved goals.</p>
        </div>
        <nav class="nav-links" data-sidebar></nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div class="page-title">
            <h1 id="page-title"></h1>
            <p id="page-text"></p>
          </div>
          <div class="topbar-right">
            <span id="active-quarter" class="badge"></span>
            <div class="profile-box" data-topbar-user></div>
          </div>
        </div>
        </section>
        <section class="card content-card">
          <div class="topbar">
            <h3 id="checkin-table-title" style="margin: 0">Approved Goals Ready for Check-In</h3>
            <p id="checkin-action-note" class="muted small-text" style="margin: 0"></p>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Employee</th>
                  <th>Goal</th>
                  <th>Target</th>
                  <th>Actuals</th>
                  <th>Quarter</th>
                  <th>Status</th>
                  <th>Score</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="checkin-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    </div>

    <div class="modal" id="checkin-modal">
      <div class="card modal-content">
        <div class="topbar">
          <div>
            <h3 id="checkin-goal-title" style="margin:0;"></h3>
            <p class="muted">Update achievements and submit the quarterly record.</p>
          </div>
          <button class="btn btn-secondary" onclick="closeModal('checkin-modal')">Close</button>
        </div>
        <input type="hidden" id="checkinGoalId" />
        <div class="form-grid">
          <div class="field">
            <label>Achievement</label>
            <input type="number" id="achievement" min="0" />
          </div>
          <div class="field">
            <label>Progress Status</label>
            <select id="progressStatus">
              <option>Not Started</option>
              <option>On Track</option>
              <option>Completed</option>
            </select>
          </div>
          <div class="field">
            <label>Completed Date</label>
            <input type="date" id="completedDate" />
          </div>
          <div class="field">
            <label>Comment</label>
            <textarea id="checkinComment"></textarea>
          </div>
          <div class="toolbar">
            <button class="btn btn-secondary" type="button" onclick="saveActualsOnly()">Save Actuals</button>
            <button class="btn btn-primary" type="button" onclick="submitCheckinRecord()">Submit Check-In</button>
          </div>
        </div>
      </div>
    </div>
    <script src="/public/js/common.js"></script>
    <script src="/public/js/checkin.js"></script>
  </body>
</html>
