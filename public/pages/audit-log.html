<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audit Log - GoalSync</title>
    <link rel="stylesheet" href="/public/css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=notifications"
    />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
</head>
  <body>
    <div class="app-shell">
    <div class="layout">
      <aside class="sidebar">
        <div class="brand-panel">
          <div class="brand-mark">GS</div>
          <div class="brand">GoalSync</div>
          <p>Governance history for post-lock updates, interventions, and escalation tracking.</p>
        </div>
        <nav class="nav-links" data-sidebar></nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div class="page-title">
            <h1 id="page-title"></h1>
            <p id="page-text"></p>
          </div>
          <div class="topbar-right">
            <div class="profile-box" data-topbar-user></div>
          </div>
        </div>
        <div id="audit-container" class="grid">
          <section class="card content-card">
            <h3>Audit Trail</h3>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>User</th>
                    <th>Action</th>
                    <th>Old Value</th>
                    <th>New Value</th>
                    <th>Timestamp</th>
                  </tr>
                </thead>
                <tbody id="audit-body"></tbody>
              </table>
            </div>
          </section>
          <section class="card content-card">
            <h3>Escalation History</h3>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Triggered By</th>
                    <th>Target User</th>
                    <th>Goal</th>
                    <th>Message</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="escalation-body"></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>
    </div>
    <script src="/public/js/common.js"></script>
    <script src="/public/js/audit.js"></script>
  </body>
</html>
